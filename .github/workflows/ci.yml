name: ci

on:
  push:
    branches:
      - main
      - "improvement/**"
      - "fix/**"
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libcurl4-openssl-dev \
            libsodium-dev \
            pandoc

      - name: Install R dependencies (cached, prefer binaries)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::DBI
            any::duckdb
            any::jsonlite
            any::uuid
            any::plumber
            any::stringr
            any::testthat
            any::callr
            any::httr2
            any::lintr
            any::styler
          pak-version: stable

      - name: Env template check
        run: Rscript scripts/checks/check-env.R

      - name: Parse check
        run: Rscript scripts/checks/check-parse.R

      - name: Format check
        run: Rscript scripts/checks/check-format.R

      - name: Lint check
        run: Rscript scripts/checks/check-lint.R

      - name: Test
        run: Rscript tests/run-tests.R
