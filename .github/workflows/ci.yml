name: ci

on:
  push:
    branches:
      - main
      - "improvement/**"
      - "fix/**"
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libcurl4-openssl-dev \
            libsodium-dev \
            pandoc

      - name: Install dependencies
        run: |
          Rscript -e "install.packages(c('DBI','duckdb','jsonlite','uuid','plumber','stringr','testthat','callr','httr2','lintr','styler'), repos='https://cloud.r-project.org')"

      - name: Parse check
        run: Rscript scripts/checks/check-parse.R

      - name: Format check
        run: Rscript scripts/checks/check-format.R

      - name: Lint check
        run: Rscript scripts/checks/check-lint.R

      - name: Test
        run: Rscript tests/run-tests.R
